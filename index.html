<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تسجيل الدخول</title>
</head>

<body style="font-family:Arial;background:#f5f5f5;display:flex;justify-content:center;align-items:center;height:100vh;">

<div style="width:100%;max-width:400px;background:#fff;padding:20px;border-radius:10px">

<h2 style="text-align:center">تسجيل الدخول</h2>

<input id="email" placeholder="email" style="width:100%;padding:10px;margin:5px 0"><br>
<input id="password" type="password" placeholder="password" style="width:100%;padding:10px;margin:5px 0"><br>

<button onclick="login()" style="width:100%;padding:10px;background:red;color:white;border:none">
Login
</button>

<p id="msg"></p>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBlIe8Ekei7UZD218fck9MI-VrLZRfh61I",
  authDomain: "soudfawebcam.firebaseapp.com",
  projectId: "soudfawebcam"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  try {
    await signInWithEmailAndPassword(auth, email, password);
    msg.innerText = "Login OK ✅";
    msg.style.color = "green";
  } catch (e) {
    msg.innerText = "Error: " + e.message;
    msg.style.color = "red";
  }
};
</script>

</body>
</html>
