<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .box {
      width: 100%;
      max-width: 380px;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }

    h2 {
      text-align: center;
      margin-top: 0;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #e53935;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    #msg {
      text-align: center;
      margin-top: 12px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>تسجيل الدخول</h2>

    <input id="email" type="email" placeholder="email" />
    <input id="password" type="password" placeholder="password" />

    <button id="loginBtn">Login</button>

    <p id="msg"></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
  apiKey: "AIzaSyBI1e8Ekei7UZDZ18fck9MI-VrLZRfh6lI",
  authDomain: "soudfawebcam.firebaseapp.com",
  projectId: "soudfawebcam",
  storageBucket: "soudfawebcam.firebasestorage.app",
  messagingSenderId: "108502213916",
  appId: "1:108502213916:web:97119c46bb23180b0746d9",
  measurementId: "G-7W2XLCD5E3"
};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const btn = document.getElementById("loginBtn");
    const msg = document.getElementById("msg");

    btn.addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      msg.style.color = "#333";
      msg.textContent = "جاري التحقق...";

      try {
        await signInWithEmailAndPassword(auth, email, password);
        msg.style.color = "green";
        msg.textContent = "Login OK ✅";
      } catch (e) {
        msg.style.color = "red";
        msg.textContent = e.message;
      }
    });
  </script>
</body>
</html>
